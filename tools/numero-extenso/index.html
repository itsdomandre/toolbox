<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Número por Extenso — ToolBox</title>
  <meta name="description" content="Converta qualquer número ou valor em reais para texto por extenso em português. Ideal para contratos, cheques e notas fiscais.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>#tb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}.tb-toast-item{background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transform:translateY(8px);transition:all .25s ease}.tb-toast-item.show{opacity:1;transform:translateY(0)}</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-xl">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">🛠️</div><span class="font-bold text-lg">ToolBox</span></a>
      <a href="../../index.html" class="text-slate-400 hover:text-white text-sm transition hidden sm:block">← Todas as ferramentas</a>
    </div>
  </header>

  <div class="bg-white border-b border-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-6">
      <p class="text-xs text-slate-400 mb-2"><a href="../../index.html" class="hover:text-indigo-600">ToolBox</a> › Número por Extenso</p>
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-2xl">🔢</div>
        <div><h1 class="text-2xl font-extrabold text-slate-900">Número por Extenso</h1><p class="text-sm text-slate-500">Converta números e valores para texto em português.</p></div>
      </div>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4 mt-6 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <main class="max-w-3xl mx-auto px-4 py-8 flex-1 w-full">
    <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6 mb-6">
      <div class="flex gap-2 mb-5">
        <button id="tab-num" onclick="setTab('num')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-amber-500 text-white transition">🔢 Número</button>
        <button id="tab-brl" onclick="setTab('brl')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">💰 Valor em R$</button>
      </div>

      <div id="panel-num">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Digite o número</label>
        <input id="input-num" type="number" placeholder="Ex: 1500" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-amber-400 transition" oninput="convert()">
        <div class="flex items-center gap-2 mt-3">
          <input type="checkbox" id="fem" class="w-4 h-4 accent-amber-500" onchange="convert()">
          <label for="fem" class="text-sm text-slate-600">Feminino (uma, duas...)</label>
        </div>
      </div>

      <div id="panel-brl" class="hidden">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Valor em reais</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-4 flex items-center text-slate-500 font-semibold">R$</span>
          <input id="input-brl" type="number" step="0.01" min="0" placeholder="0,00" class="w-full border border-slate-300 rounded-xl pl-10 pr-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-amber-400 transition" oninput="convert()">
        </div>
      </div>
    </div>

    <div id="result-box" class="bg-amber-50 border border-amber-200 rounded-2xl p-6 hidden">
      <div class="flex items-start justify-between gap-4">
        <p id="result-text" class="text-slate-800 text-lg leading-relaxed font-medium flex-1"></p>
        <button onclick="copyText(document.getElementById('result-text').textContent)" class="flex-shrink-0 bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">📋 Copiar</button>
      </div>
    </div>

    <div class="mt-6">
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">Exemplos rápidos</p>
      <div class="flex flex-wrap gap-2">
        <button onclick="quickExample(0)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">0</button>
        <button onclick="quickExample(1)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">1</button>
        <button onclick="quickExample(13)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">13</button>
        <button onclick="quickExample(100)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">100</button>
        <button onclick="quickExample(1000)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">1.000</button>
        <button onclick="quickExample(15000)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">15.000</button>
        <button onclick="quickExample(1000000)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">1.000.000</button>
        <button onclick="quickExample(1000000000)" class="bg-white border border-slate-200 hover:border-amber-400 text-slate-700 text-sm px-3 py-1.5 rounded-lg transition">1 bilhão</button>
      </div>
    </div>
  </main>

  <div class="max-w-3xl mx-auto px-4 pb-8 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <footer class="bg-slate-900 text-slate-400 text-sm py-8 mt-auto">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <div class="flex flex-wrap gap-x-4 gap-y-2 justify-center mb-4 text-xs">
        <a href="../../tools/text-tools/" class="hover:text-white transition">📝 Texto</a><a href="../../tools/lorem-ipsum/" class="hover:text-white transition">📄 Lorem Ipsum</a><a href="../../tools/currency/" class="hover:text-white transition">💱 Moedas</a><a href="../../tools/percentagem/" class="hover:text-white transition">🧮 Percentagem</a>
      </div>
      <p class="text-xs text-slate-500">© 2026 ToolBox · <a href="../../index.html" class="hover:text-white transition">Ver todas as ferramentas</a></p>
    </div>
  </footer>

  <div id="tb-toast"></div>
  <script>
    function toast(msg,type='success'){const w=document.getElementById('tb-toast');const e=document.createElement('div');e.className='tb-toast-item';e.textContent=(type==='success'?'✓ ':'✗ ')+msg;w.appendChild(e);requestAnimationFrame(()=>e.classList.add('show'));setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300)},2500);}
    function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copiado!')).catch(()=>toast('Erro','error'));}

    let currentTab = 'num';
    function setTab(t) {
      currentTab = t;
      document.getElementById('panel-num').classList.toggle('hidden', t !== 'num');
      document.getElementById('panel-brl').classList.toggle('hidden', t !== 'brl');
      document.getElementById('tab-num').className = `flex-1 py-2 rounded-xl text-sm font-semibold transition ${t==='num'?'bg-amber-500 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
      document.getElementById('tab-brl').className = `flex-1 py-2 rounded-xl text-sm font-semibold transition ${t==='brl'?'bg-amber-500 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
      convert();
    }

    const units = ['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
    const unitsF = ['','uma','duas','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
    const tens = ['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
    const hundreds = ['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];

    function group(n, fem) {
      if (n === 0) return '';
      const u = fem ? unitsF : units;
      let r = '';
      if (n === 100) return 'cem';
      if (n >= 100) { r += hundreds[Math.floor(n/100)]; n %= 100; if (n) r += ' e '; }
      if (n >= 20) { r += tens[Math.floor(n/10)]; n %= 10; if (n) r += ' e '; r += u[n]; }
      else if (n > 0) r += u[n];
      return r;
    }

    function toWords(n, fem = false) {
      if (isNaN(n) || n === null) return '';
      n = Math.floor(Math.abs(n));
      if (n === 0) return 'zero';
      const parts = [];
      const b = Math.floor(n / 1e9); n %= 1e9;
      const m = Math.floor(n / 1e6); n %= 1e6;
      const k = Math.floor(n / 1e3); n %= 1e3;
      const r = n;
      if (b) parts.push(group(b, false) + (b === 1 ? ' bilhão' : ' bilhões'));
      if (m) parts.push(group(m, false) + (m === 1 ? ' milhão' : ' milhões'));
      if (k) parts.push(group(k, false) + ' mil');
      if (r) parts.push(group(r, fem));
      return parts.join(' e ');
    }

    function convert() {
      const fem = document.getElementById('fem')?.checked || false;
      let text = '';
      if (currentTab === 'num') {
        const v = parseFloat(document.getElementById('input-num').value);
        if (isNaN(v) || document.getElementById('input-num').value === '') { document.getElementById('result-box').classList.add('hidden'); return; }
        text = (v < 0 ? 'menos ' : '') + toWords(Math.abs(v), fem);
      } else {
        const v = parseFloat(document.getElementById('input-brl').value);
        if (isNaN(v) || document.getElementById('input-brl').value === '') { document.getElementById('result-box').classList.add('hidden'); return; }
        const intPart = Math.floor(Math.abs(v));
        const centPart = Math.round((Math.abs(v) - intPart) * 100);
        const neg = v < 0 ? 'menos ' : '';
        let r = neg + toWords(intPart, false) + (intPart === 1 ? ' real' : ' reais');
        if (centPart > 0) r += ' e ' + toWords(centPart, false) + (centPart === 1 ? ' centavo' : ' centavos');
        text = r;
      }
      document.getElementById('result-text').textContent = text.charAt(0).toUpperCase() + text.slice(1);
      document.getElementById('result-box').classList.remove('hidden');
    }

    function quickExample(n) {
      setTab('num');
      document.getElementById('input-num').value = n;
      convert();
    }
  </script>
</body>
</html>
