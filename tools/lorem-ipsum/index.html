<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Lorem Ipsum — ToolBox</title>
  <meta name="description" content="Gere texto Lorem Ipsum placeholder para designs, protótipos e mockups. Gratuito e instantâneo.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>#tb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}.tb-toast-item{background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transform:translateY(8px);transition:all .25s ease}.tb-toast-item.show{opacity:1;transform:translateY(0)}</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-xl">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">🛠️</div><span class="font-bold text-lg">ToolBox</span></a>
      <a href="../../index.html" class="text-slate-400 hover:text-white text-sm transition hidden sm:block">← Todas as ferramentas</a>
    </div>
  </header>

  <div class="bg-white border-b border-slate-100">
    <div class="max-w-3xl mx-auto px-4 py-6">
      <p class="text-xs text-slate-400 mb-2"><a href="../../index.html" class="hover:text-indigo-600">ToolBox</a> › Gerador de Lorem Ipsum</p>
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-2xl">📄</div>
        <div><h1 class="text-2xl font-extrabold text-slate-900">Gerador de Lorem Ipsum</h1><p class="text-sm text-slate-500">Texto placeholder para designs, mockups e protótipos.</p></div>
      </div>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4 mt-6 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <main class="max-w-3xl mx-auto px-4 py-8 flex-1 w-full">
    <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6 mb-6">
      <div class="flex gap-2 mb-5">
        <button id="tab-par" onclick="setTab('par')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-amber-500 text-white transition">Parágrafos</button>
        <button id="tab-sen" onclick="setTab('sen')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">Frases</button>
        <button id="tab-wrd" onclick="setTab('wrd')" class="flex-1 py-2 rounded-xl text-sm font-semibold bg-slate-100 text-slate-600 hover:bg-slate-200 transition">Palavras</button>
      </div>
      <div class="flex items-center gap-4 mb-5">
        <label class="text-sm font-semibold text-slate-700 flex-shrink-0">Quantidade:</label>
        <input id="count" type="number" min="1" max="50" value="3" class="w-20 border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-amber-400">
        <div class="flex flex-wrap gap-2">
          <button onclick="setCount(1)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-lg transition">1</button>
          <button onclick="setCount(3)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-lg transition">3</button>
          <button onclick="setCount(5)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-lg transition">5</button>
          <button onclick="setCount(10)" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-3 py-1.5 rounded-lg transition">10</button>
        </div>
      </div>
      <div class="flex flex-wrap gap-4 mb-5">
        <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer"><input type="checkbox" id="chk-lorem" checked class="w-4 h-4 accent-amber-500" onchange="generate()"> Começar com "Lorem ipsum..."</label>
        <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer"><input type="checkbox" id="chk-html" class="w-4 h-4 accent-amber-500" onchange="generate()"> Formato HTML (&lt;p&gt;)</label>
      </div>
      <button onclick="generate()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl transition text-base">⚡ Gerar Texto</button>
    </div>

    <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
        <span id="stats" class="text-xs text-slate-400">—</span>
        <button onclick="copyText(document.getElementById('output').value)" class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition">📋 Copiar</button>
      </div>
      <textarea id="output" rows="12" readonly class="w-full px-5 py-4 text-sm text-slate-700 leading-relaxed font-sans focus:outline-none resize-none"></textarea>
    </div>
  </main>

  <div class="max-w-3xl mx-auto px-4 pb-8 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <footer class="bg-slate-900 text-slate-400 text-sm py-8 mt-auto">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <p class="text-xs text-slate-500">© 2026 ToolBox · <a href="../../index.html" class="hover:text-white transition">Ver todas as ferramentas</a></p>
    </div>
  </footer>

  <div id="tb-toast"></div>
  <script>
    function toast(msg,type='success'){const w=document.getElementById('tb-toast');const e=document.createElement('div');e.className='tb-toast-item';e.textContent=(type==='success'?'✓ ':'✗ ')+msg;w.appendChild(e);requestAnimationFrame(()=>e.classList.add('show'));setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300)},2500);}
    function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copiado!')).catch(()=>toast('Erro','error'));}

    const WORDS=['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum','perspiciatis','unde','omnis','iste','natus','error','voluptatem','accusantium','doloremque','laudantium','totam','rem','aperiam','eaque','ipsa','quae','ab','illo','inventore','veritatis','quasi','architecto','beatae','vitae','dicta','explicabo','nemo','ipsam','quia','voluptas','aspernatur','aut','odit','fugit','consequuntur','magni','dolores','ratione','sequi','nesciunt','neque','porro','quisquam','dolorem'];
    const LOREM_START='Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';

    function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
    function rndWord(){return WORDS[rnd(0,WORDS.length-1)];}
    function makeSentence(n){const words=[];for(let i=0;i<n;i++)words.push(rndWord());const s=words.join(' ');return s.charAt(0).toUpperCase()+s.slice(1)+'.';}
    function makeParagraph(){const sents=[];for(let i=0;i<rnd(3,6);i++)sents.push(makeSentence(rnd(8,20)));return sents.join(' ');}

    let mode='par';
    function setTab(t){mode=t;['par','sen','wrd'].forEach(id=>{const btn=document.getElementById('tab-'+id);btn.className=`flex-1 py-2 rounded-xl text-sm font-semibold transition ${id===t?'bg-amber-500 text-white':'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;});generate();}
    function setCount(n){document.getElementById('count').value=n;generate();}

    function generate(){
      const n=Math.max(1,Math.min(50,parseInt(document.getElementById('count').value)||3));
      const useLorem=document.getElementById('chk-lorem').checked;
      const useHtml=document.getElementById('chk-html').checked;
      let parts=[];
      if(mode==='par'){for(let i=0;i<n;i++)parts.push(i===0&&useLorem?LOREM_START+' '+makeParagraph():makeParagraph());}
      else if(mode==='sen'){for(let i=0;i<n;i++)parts.push(i===0&&useLorem?makeSentence(rnd(8,16)):makeSentence(rnd(8,16)));if(useLorem)parts[0]=LOREM_START;}
      else{const words=[];if(useLorem)words.push(...'lorem ipsum dolor sit amet'.split(' '));while(words.length<n)words.push(rndWord());parts=[words.slice(0,n).join(' ')];}
      const text=useHtml?parts.map(p=>`<p>${p}</p>`).join('\n\n'):parts.join('\n\n');
      document.getElementById('output').value=text;
      const wc=text.replace(/<[^>]+>/g,'').split(/\s+/).filter(Boolean).length;
      document.getElementById('stats').textContent=`${wc} palavras · ${text.length} caracteres`;
    }

    generate();
  </script>
</body>
</html>
