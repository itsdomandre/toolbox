<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Cores HEX RGB HSL — ToolBox</title>
  <meta name="description" content="Converta cores entre HEX, RGB e HSL instantaneamente. Visualize cores, gere paletas e copie o código CSS.">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>#tb-toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}.tb-toast-item{background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transform:translateY(8px);transition:all .25s ease}.tb-toast-item.show{opacity:1;transform:translateY(0)}.swatch{cursor:pointer;transition:transform .15s ease}.swatch:hover{transform:scale(1.15)}</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white shadow-xl">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="../../index.html" class="flex items-center gap-2 hover:opacity-80 transition"><div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center">🛠️</div><span class="font-bold text-lg">ToolBox</span></a>
      <a href="../../index.html" class="text-slate-400 hover:text-white text-sm transition hidden sm:block">← Todas as ferramentas</a>
    </div>
  </header>

  <div class="bg-white border-b border-slate-100">
    <div class="max-w-4xl mx-auto px-4 py-6">
      <p class="text-xs text-slate-400 mb-2"><a href="../../index.html" class="hover:text-indigo-600">ToolBox</a> › Conversor de Cores</p>
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-violet-100 text-violet-600 rounded-xl flex items-center justify-center text-2xl">🎨</div>
        <div><h1 class="text-2xl font-extrabold text-slate-900">Conversor de Cores</h1><p class="text-sm text-slate-500">Converta HEX, RGB, HSL e gere paletas de cores instantaneamente.</p></div>
      </div>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 mt-6 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <main class="max-w-4xl mx-auto px-4 py-8 flex-1 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Preview + picker -->
      <div class="lg:col-span-1">
        <div id="preview" class="w-full h-48 rounded-2xl shadow-lg mb-4 border border-slate-200" style="background:#6366f1"></div>
        <div class="flex gap-3 items-center mb-4">
          <label class="flex-1">
            <span class="text-xs text-slate-500 block mb-1">Escolher cor</span>
            <input type="color" id="picker" value="#6366f1" class="w-full h-10 rounded-lg border border-slate-300 cursor-pointer" oninput="fromPicker()">
          </label>
          <button onclick="randomColor()" class="mt-5 bg-violet-100 hover:bg-violet-200 text-violet-700 font-semibold text-sm px-4 py-2 rounded-xl transition">🎲</button>
        </div>
        <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-sm">
          <p class="text-xs text-slate-400 font-semibold mb-2">CSS</p>
          <div class="space-y-1.5">
            <div class="flex justify-between items-center"><code id="css-hex" class="text-xs text-slate-600 font-mono"></code><button onclick="copyText(document.getElementById('css-hex').textContent)" class="text-xs text-violet-600 hover:text-violet-800">📋</button></div>
            <div class="flex justify-between items-center"><code id="css-rgb" class="text-xs text-slate-600 font-mono"></code><button onclick="copyText(document.getElementById('css-rgb').textContent)" class="text-xs text-violet-600 hover:text-violet-800">📋</button></div>
            <div class="flex justify-between items-center"><code id="css-hsl" class="text-xs text-slate-600 font-mono"></code><button onclick="copyText(document.getElementById('css-hsl').textContent)" class="text-xs text-violet-600 hover:text-violet-800">📋</button></div>
          </div>
        </div>
      </div>

      <!-- Converters -->
      <div class="lg:col-span-2 space-y-4">
        <!-- HEX -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-5">
          <div class="flex items-center justify-between mb-3"><h3 class="font-bold text-slate-800">HEX</h3><button onclick="copyText(document.getElementById('hex-in').value)" class="text-xs text-violet-600">📋 Copiar</button></div>
          <input id="hex-in" type="text" maxlength="7" placeholder="#6366f1" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 font-mono text-lg focus:outline-none focus:ring-2 focus:ring-violet-400 uppercase" oninput="fromHex()" value="#6366f1">
        </div>

        <!-- RGB -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-5">
          <div class="flex items-center justify-between mb-3"><h3 class="font-bold text-slate-800">RGB</h3><button onclick="copyText(`rgb(${document.getElementById('r-in').value}, ${document.getElementById('g-in').value}, ${document.getElementById('b-in').value})`)" class="text-xs text-violet-600">📋 Copiar</button></div>
          <div class="grid grid-cols-3 gap-3">
            <div><label class="text-xs text-slate-500 mb-1 block">R (0–255)</label><input id="r-in" type="number" min="0" max="255" placeholder="99" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromRGB()"></div>
            <div><label class="text-xs text-slate-500 mb-1 block">G (0–255)</label><input id="g-in" type="number" min="0" max="255" placeholder="102" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromRGB()"></div>
            <div><label class="text-xs text-slate-500 mb-1 block">B (0–255)</label><input id="b-in" type="number" min="0" max="255" placeholder="241" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromRGB()"></div>
          </div>
        </div>

        <!-- HSL -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-5">
          <div class="flex items-center justify-between mb-3"><h3 class="font-bold text-slate-800">HSL</h3><button onclick="copyText(`hsl(${document.getElementById('h-in').value}, ${document.getElementById('s-in').value}%, ${document.getElementById('l-in').value}%)`)" class="text-xs text-violet-600">📋 Copiar</button></div>
          <div class="grid grid-cols-3 gap-3">
            <div><label class="text-xs text-slate-500 mb-1 block">H (0–360°)</label><input id="h-in" type="number" min="0" max="360" placeholder="239" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromHSL()"></div>
            <div><label class="text-xs text-slate-500 mb-1 block">S (0–100%)</label><input id="s-in" type="number" min="0" max="100" placeholder="84" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromHSL()"></div>
            <div><label class="text-xs text-slate-500 mb-1 block">L (0–100%)</label><input id="l-in" type="number" min="0" max="100" placeholder="67" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-center focus:outline-none focus:ring-2 focus:ring-violet-400" oninput="fromHSL()"></div>
          </div>
        </div>

        <!-- Palette -->
        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-5">
          <h3 class="font-bold text-slate-800 mb-3">Paleta de tons</h3>
          <div id="palette" class="flex gap-2 flex-wrap"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="max-w-4xl mx-auto px-4 pb-8 w-full">
    <div class="w-full h-20 border-2 border-dashed border-indigo-100 rounded-xl flex items-center justify-center text-xs font-mono text-indigo-300 bg-indigo-50/50">[ AdSense · 728×90 ]</div>
  </div>

  <footer class="bg-slate-900 text-slate-400 text-sm py-8 mt-auto">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <p class="text-xs text-slate-500">© 2026 ToolBox · <a href="../../index.html" class="hover:text-white transition">Ver todas as ferramentas</a></p>
    </div>
  </footer>

  <div id="tb-toast"></div>
  <script>
    function toast(msg,type='success'){const w=document.getElementById('tb-toast');const e=document.createElement('div');e.className='tb-toast-item';e.textContent=(type==='success'?'✓ ':'✗ ')+msg;w.appendChild(e);requestAnimationFrame(()=>e.classList.add('show'));setTimeout(()=>{e.classList.remove('show');setTimeout(()=>e.remove(),300)},2500);}
    function copyText(t){navigator.clipboard.writeText(t).then(()=>toast('Copiado!')).catch(()=>toast('Erro','error'));}

    function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');const r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);return{r,g,b};}
    function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');}
    function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};}
    function hslToRgb(h,s,l){s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};}

    function updateAll(hex){const{r,g,b}=hexToRgb(hex);const{h,s,l}=rgbToHsl(r,g,b);document.getElementById('preview').style.background=hex;document.getElementById('picker').value=hex;document.getElementById('hex-in').value=hex.toUpperCase();document.getElementById('r-in').value=r;document.getElementById('g-in').value=g;document.getElementById('b-in').value=b;document.getElementById('h-in').value=h;document.getElementById('s-in').value=s;document.getElementById('l-in').value=l;document.getElementById('css-hex').textContent=`color: ${hex.toUpperCase()};`;document.getElementById('css-rgb').textContent=`color: rgb(${r}, ${g}, ${b});`;document.getElementById('css-hsl').textContent=`color: hsl(${h}, ${s}%, ${l}%);`;renderPalette(h,s,l);}

    function renderPalette(h,s,l){const shades=[10,20,30,40,50,60,70,80,90];const el=document.getElementById('palette');el.innerHTML=shades.map(ll=>{const{r,g,b}=hslToRgb(h,s,ll);const hex=rgbToHex(r,g,b);return `<div class="swatch w-10 h-10 rounded-lg shadow-sm border border-slate-200 flex items-center justify-center text-xs font-mono" style="background:${hex};color:${ll>60?'#1e293b':'#fff'}" title="${hex}" onclick="updateAll('${hex}')"></div>`;}).join('');}

    function fromPicker(){updateAll(document.getElementById('picker').value);}
    function fromHex(){let v=document.getElementById('hex-in').value.trim();if(!v.startsWith('#'))v='#'+v;if(/^#[0-9a-fA-F]{6}$/.test(v)||/^#[0-9a-fA-F]{3}$/.test(v))updateAll(v);}
    function fromRGB(){const r=parseInt(document.getElementById('r-in').value),g=parseInt(document.getElementById('g-in').value),b=parseInt(document.getElementById('b-in').value);if([r,g,b].some(isNaN))return;updateAll(rgbToHex(r,g,b));}
    function fromHSL(){const h=parseInt(document.getElementById('h-in').value),s=parseInt(document.getElementById('s-in').value),l=parseInt(document.getElementById('l-in').value);if([h,s,l].some(isNaN))return;const{r,g,b}=hslToRgb(h,s,l);updateAll(rgbToHex(r,g,b));}
    function randomColor(){const h=Math.floor(Math.random()*360),s=50+Math.floor(Math.random()*30),l=45+Math.floor(Math.random()*20);const{r,g,b}=hslToRgb(h,s,l);updateAll(rgbToHex(r,g,b));}

    updateAll('#6366f1');
  </script>
</body>
</html>
